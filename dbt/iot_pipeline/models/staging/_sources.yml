version: 2

sources:
  - name: raw
    database: IOT_PIPELINE
    schema: RAW
    description: "Raw sensor data loaded from S3 as VARIANT JSON"

    freshness:
      warn_after: {count: 30, period: minute}
      error_after: {count: 60, period: minute}

    loaded_at_field: loaded_at

    tables:
      - name: sensor_readings
        description: "Raw IoT sensor readings - one VARIANT row per reading"
        columns:
          - name: raw_data
            description: "Entire JSON payload as VARIANT"
          - name: loaded_at
            description: "Timestamp when row was loaded via COPY INTO"
          - name: source_file
            description: "S3 file path the reading came from"
