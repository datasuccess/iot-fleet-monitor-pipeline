x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    AIRFLOW__WEBSERVER__BASE_URL: "http://localhost:8080"
    AIRFLOW__LOGGING__LOGGING_LEVEL: "INFO"
    # Low memory tuning for t4g.small (2GB + 2GB swap)
    AIRFLOW__WEBSERVER__WORKERS: "2"
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "120"
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "120"
    AIRFLOW__SCHEDULER__PARSING_PROCESSES: "1"
    AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: "180"
    AIRFLOW__SCHEDULER__DAG_FILE_PROCESSOR_TIMEOUT: "180"
    AIRFLOW__CORE__PARALLELISM: "4"
    AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "4"
    # Snowflake connection (used by DAG tasks and Cosmos)
    SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT:-}
    SNOWFLAKE_USER: ${SNOWFLAKE_USER:-}
    SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD:-}
    SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE:-IOT_TRANSFORMER}
    SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE:-IOT_WH}
    SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE:-IOT_PIPELINE}
    # AWS credentials (used by Lambda invocation)
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ../dbt/iot_pipeline:/opt/airflow/dbt/iot_pipeline
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    # Low memory: limit shared buffers
    command: >
      postgres
      -c shared_buffers=128MB
      -c max_connections=50

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username airflow \
          --firstname Airflow \
          --lastname Admin \
          --role Admin \
          --email admin@example.com \
          --password airflow
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-data:
