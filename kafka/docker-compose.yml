# =============================================================================
# Kafka Streaming Stack
# Run: docker compose up -d
# =============================================================================
#
# Architecture:
#   Zookeeper (coordination) → Kafka Broker (message store) → Kafka UI (monitoring)
#
# Our pipeline comparison:
#   BATCH:     Lambda → S3 → COPY INTO (hourly, ~60 min latency)
#   STREAMING: Producer → Kafka → Consumer → Snowflake (sub-second latency)

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | timeout 2 bash -c 'cat > /dev/tcp/localhost/2181' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"      # External (host machine)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Listeners: internal (Docker) + external (host)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092

      # Topic defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3

      # Retention: keep messages for 24 hours (default is 7 days)
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 1073741824  # 1 GB max per partition

      # Performance tuning for small instance
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:29092 --list
      interval: 15s
      timeout: 10s
      retries: 5

  # Kafka UI — web dashboard to see topics, messages, consumer groups
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: iot-fleet
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"

  # One-shot container to create our topic
  init-kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'

      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:29092 \
        --topic iot.sensor.readings \
        --partitions 5 \
        --replication-factor 1 \
        --config retention.ms=86400000

      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:29092 \
        --topic iot.sensor.alerts \
        --partitions 3 \
        --replication-factor 1

      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:29092 \
        --topic iot.sensor.deadletter \
        --partitions 1 \
        --replication-factor 1

      echo 'Topics created:'
      kafka-topics --list --bootstrap-server kafka:29092
      "
